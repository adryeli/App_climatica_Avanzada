<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de nuevos usuarios</title>
    <link rel="stylesheet" href="static/css/registro_style.css">
</head>
<body>
    <div class="container mt-5">
    <h1>Crear Cuenta</h1>

<form action="/auth/register" method="POST">
    <div class="mb-3">
        <label for="username" class="form-label"><b>Email de Usuario</b></label>
        <input type="email" class="form-control" id="username" name="username" required>
    </div>
    <div class="mb-3">
        <label for="password" class="form-label"><b>Contraseña</b></label>
        <input type="password" class="form-control" id="password" name="password" required>
    </div>

    <div class="mb-3">
        <label for="confirm_password" class="form-label"><b>Repetir Contraseña</b></label>
        <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
    </div>

    <div class="d-grid">
        <button type="submit" class="btn btn-primary"><b>Crear Cuenta</b></button>
    </div>
</form>
</div> </body>
</html>
