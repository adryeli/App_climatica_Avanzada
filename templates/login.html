<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login_style.css') }}">
</head>

<body>

    <main class="login-container">
        <h1>Iniciar Sesión</h1>

        <form id="loginForm" action="/auth/login" method="POST" class="login-form">
            <div class="form-group">
                <label for="email"><b>Correo Electrónico</b></label>
                <input type="email" id="email" name="email" required>
                <span id="emailError" class="error-msg"></span>
            </div>

            <div class="form-group">
                <label for="password"><b>Contraseña</b></label>
                <input type="password" id="password" name="password" required>
                <span id="passwordError" class="error-msg"></span>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit"><b>Iniciar Sesión</b></button>
            </div>
            
            <div class="navigation-links">
                <a href="{{ url_for('inicio') }}" class="btn-secondary">
                    ← Volver al inicio
                </a>
            </div>

        </form> {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="alert-container">
            {% for message in messages %}
            <p class="alert-error">
                {{ message }}
                <br>
                <span>¿No tienes cuenta? <a href="{{ url_for('registro') }}">Regístrate aquí</a></span>
            </p>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}
    </main>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>

</html>
