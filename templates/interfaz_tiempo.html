<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Climático</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div style="max-width: 500px; margin: 50px auto; font-family: sans-serif;">
        <h2>🌡️ Nuevo Registro Climático</h2>
        <p>Introduce los datos para el historial.</p>
        <hr>
        
        <form action="/guardar_clima" method="POST">
            <label>Fecha:</label><br>
            <input type="date" name="fecha" required style="width:100%"><br><br>

            <label>Zona / Ciudad:</label><br>
            <input type="text" name="zona" placeholder="Ej: Madrid" required style="width:100%"><br><br>

            <label>Temperatura (°C):</label><br>
            <input type="number" step="0.1" name="temperatura" required style="width:100%"><br><br>

            <label>Humedad (%):</label><br>
            <input type="number" name="humedad" min="0" max="100" required style="width:100%"><br><br>

            <label>Viento (km/h):</label><br>
            <input type="number" step="0.1" name="viento" required style="width:100%"><br><br>

            <label>Lluvia (mm):</label><br>
            <input type="number" step="0.1" name="lluvia" required style="width:100%"><br><br>

            <button type="submit" style="background: #28a745; color: white; border: none; padding: 10px; width: 100%; cursor: pointer;">
                Guardar Registro
            </button>
        </form>
    </div>

    <script src="{{ url_for('static', filename='js/weather.js') }}"></script>
</body>
</html>
